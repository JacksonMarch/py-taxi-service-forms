{% extends "base.html" %}
{% block content %}
  <h1>Delete Car</h1>

  <p>Are you sure you want to delete the car: {{ car }}?</p>
  <p><i>This car will be deleted from all drivers!</i></p>
  <form action="" method="post">
    {% csrf_token %}
    <input type="submit" value="Yes, delete" class="btn btn-danger" />
    <a href="{{ request.META.HTTP_REFERER }}" class="btn btn-outline-success">Cancel</a>
  </form>
{% endblock %}
